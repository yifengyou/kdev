name: hack

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      arch_type:
        description: '架构'
        required: false
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64

env:
  TZ: America/New_York
  ACTIONS_STEP_DEBUG: true

jobs:
  build-amd64:
    if: ${{ github.event.inputs.arch_type == 'amd64' }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        os_release: [
            'rockylinux-qcow2/kdev_Rocky-10.0-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-10.1-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.3-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.4-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.5-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.6-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.7-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.8-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-8.9-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-9.0-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-9.1-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-9.2-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-9.3-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-9.4-x86_64-minimal.qcow2.tar.gz',
            'rockylinux-qcow2/kdev_Rocky-9.5-x86_64-minimal.qcow2.tar.gz',
        ]
      max-parallel: 64
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

      - name: Install dependency
        run: |
          sudo apt update
          sudo apt install -qq -y qemu-kvm libvirt-daemon-system virtinst cpu-checker aria2 ansible sshpass
          sudo mkdir -p /builder/release

      - name: Download qcow2
        timeout-minutes: 30
        working-directory: /builder/
        run: |
          set -x
          sudo /bin/cp -a ${{ github.workspace }}/* .
          ls -alh
          aria2c -o rootfs.qcow2.tar.gz https://github.com/yifengyou/kdev/releases/download/${{ matrix.os_release }}
          ls -alh rootfs.qcow2.tar.gz
          md5sum rootfs.qcow2.tar.gz
          tar -xvf rootfs.qcow2.tar.gz
          ls -alh rootfs.qcow2
          md5sum rootfs.qcow2

      - name: Startup vm
        working-directory: /builder/
        run: |
          set -x
          sudo qemu-system-x86_64 \
            -name "kdev-${RANDOM}" \
            -machine q35 \
            -accel kvm \
            -drive if=pflash,format=raw,unit=0,file=/usr/share/OVMF/OVMF_CODE.fd \
            -drive if=pflash,format=raw,unit=1,file=/usr/share/OVMF/OVMF_VARS.fd \
            -cpu max \
            -smp $(nproc) \
            -m 8192 \
            -device virtio-scsi-pci,id=scsi \
            -drive file=rootfs.qcow2,format=qcow2,if=virtio \
            -net nic \
            -net user,net=192.168.122.0/24,host=192.168.122.1,hostfwd=tcp::63333-:22 \
            -display none -daemonize

          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          sshpass -p "linux" ssh-copy-id -o StrictHostKeyChecking=no -p 63333 kdev@localhost
          sshpass -p "linux" ssh -p 63333 kdev@localhost "echo 'kdev ALL=(ALL) NOPASSWD: ALL' | sudo tee -a /etc/sudoers"
          ssh -p 63333 localhost uname -a
          ssh -p 63333 localhost df -h

      - name: Upload image to release
        uses: ncipollo/release-action@main
        timeout-minutes: 10
        with:
          tag: rockylinux-qcow2
          artifacts: /builder/release/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: | # RockyLinux qcow2

            ## 镜像信息

            1. ISO来源于RockyLinux官方  <https://cdimage.RockyLinux.org/cdimage/archive/>
            2. 支持架构：amd64 / arm64
            3. root账号密码: root 密码 linux
            4. 普通用户账号密码： kdev 密码 linux

            ## 免责声明

            - **按原样提供**：本镜像不作任何明示或暗示保证，使用风险由用户自行承担
            - **无官方关联**：RockyLinux 是开源社区项目，本镜像与 RockyLinux 团队无官方关联
            - **安全提示**：请及时修改默认密码，配置防火墙，请谨慎开放端口

  build-arm64:
    if: ${{ github.event.inputs.arch_type == 'arm64' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        os_release: [
            'RockyLinux-13.4.0-arm64-DVD-1',
            'RockyLinux-13.3.0-arm64-DVD-1',
            'RockyLinux-13.2.0-arm64-DVD-1',
            'RockyLinux-13.1.0-arm64-DVD-1',
            'RockyLinux-13.0.0-arm64-DVD-1',
            'RockyLinux-12.13.0-arm64-DVD-1',
            'RockyLinux-12.12.0-arm64-DVD-1',
            'RockyLinux-12.11.0-arm64-DVD-1',
            'RockyLinux-12.10.0-arm64-DVD-1',
            'RockyLinux-12.9.0-arm64-DVD-1',
            'RockyLinux-12.8.0-arm64-DVD-1',
            'RockyLinux-12.7.0-arm64-DVD-1',
            'RockyLinux-12.6.0-arm64-DVD-1',
            'RockyLinux-12.5.0-arm64-DVD-1',
            'RockyLinux-12.4.0-arm64-DVD-1',
            'RockyLinux-12.2.0-arm64-DVD-1',
            'RockyLinux-12.1.0-arm64-DVD-1',
            'RockyLinux-12.0.0-arm64-DVD-1',
            'RockyLinux-11.11.0-arm64-DVD-1',
            'RockyLinux-11.10.0-arm64-DVD-1',
            'RockyLinux-11.9.0-arm64-DVD-1',
            'RockyLinux-11.8.0-arm64-DVD-1',
            'RockyLinux-11.7.0-arm64-DVD-1',
            'RockyLinux-11.6.0-arm64-DVD-1',
            'RockyLinux-11.5.0-arm64-DVD-1',
            'RockyLinux-11.4.0-arm64-DVD-1',
            'RockyLinux-11.3.0-arm64-DVD-1',
            'RockyLinux-11.2.0-arm64-DVD-1',
            'RockyLinux-11.1.0-arm64-DVD-1',
            'RockyLinux-11.0.0-arm64-DVD-1',
        ]
      max-parallel: 64
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

      - name: Install dependency
        run: |
          set -x
          uname -a
          lscpu
          ls -alh /dev/kvm || :
          sudo apt update
          sudo apt install -qq -y qemu-kvm libvirt-daemon-system virtinst cpu-checker aria2
          sudo systemctl enable --now libvirtd
          sudo mkdir -p /builder/release

      - name: Build rootfs in vm
        timeout-minutes: 120
        working-directory: /builder/
        run: |
          set -x
          sudo /bin/cp -a ${{ github.workspace }}/* .
          ls -alh
          cd iso/${{ matrix.os_release }}
          sudo ./build-vm.sh
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Compress Rootfs image
        working-directory: /builder/
        run: |
          set -x
          cd iso/${{ matrix.os_release }}
          ls -alh
          sudo tar -zcvf /builder/release/kdev_${{ matrix.os_release }}.qcow2.tar.gz rootfs.qcow2
          ls -alh /builder/release/
          FILE_PATH="/builder/release/kdev_${{ matrix.os_release }}.qcow2.tar.gz"
          FILE_SIZE=$(stat -c%s "$FILE_PATH")
          LIMIT_SIZE=$((80 * 1024 * 1024))
          echo "文件大小: $FILE_SIZE 字节"
          echo "限制大小: $LIMIT_SIZE 字节"
          if [ "$FILE_SIZE" -lt "$LIMIT_SIZE" ]; then
            echo "::error::❌ 打包失败：文件 $FILE_NAME 大小为 $(($FILE_SIZE / 1024 / 1024))M，小于 80M 的最低要求！"
            exit 1
          else
            echo "✅ 检查通过：文件大小符合要求。"
          fi
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload image to release
        uses: ncipollo/release-action@main
        timeout-minutes: 10
        with:
          tag: rockylinux-qcow2
          artifacts: /builder/release/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: | # RockyLinux qcow2

            ## 镜像信息

            1. ISO来源于RockyLinux官方 <https://cdimage.RockyLinux.org/cdimage/archive/>
            2. 支持架构：amd64 / arm64
            3. root账号密码: root 密码 linux
            4. 普通用户账号密码： kdev 密码 linux

            ## 免责声明

            - **按原样提供**：本镜像不作任何明示或暗示保证，使用风险由用户自行承担
            - **无官方关联**：RockyLinux 是开源社区项目，本镜像与 RockyLinux 团队无官方关联
            - **安全提示**：请及时修改默认密码，配置防火墙，请谨慎开放端口
